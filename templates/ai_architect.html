{% extends 'base.html' %}
{% block content %}

<!-- Restored permanent two-column layout -->
<div class="row">
    <!-- Column 1: Recipe Finder (Always Visible) -->
    <div class="col-md-3">
        <div class="card p-3 h-100">
            <h5>Recipe Finder</h5>
            <input type="search" id="recipe-search" class="form-control mb-2" placeholder="Find a replacement...">
            <button type="button" id="suggest-btn" class="btn btn-secondary btn-block"><i class="fas fa-lightbulb"></i> Suggest</button>
            <hr>
            <h6>Recipe Tray</h6>
            <div id="recipe-tray" class="sortable-list" style="min-height: 200px;"></div>
        </div>
    </div>

    <!-- Column 2: Controls and AI Results -->
    <div class="col-md-9">
        <div class="card mb-3">
            <div class="card-body">
                <div class="text-center">
                    <h1><i class="fas fa-magic"></i> AI Meal Plan Architect</h1>
                    <p class="lead mb-0">Choose a theme and let the AI build your weekly plan!</p>
                </div>
                <hr>
                <div class="row align-items-end justify-content-center">
                    <div class="col-md-5">
                        <label for="plan-theme">Choose a Theme:</label>
                        <!-- Includes the 8 new themes -->
                        <select id="plan-theme" class="form-control">
                          <option value="A Balanced and Varied Week">A Balanced Week</option>
                          <option value="Quick & Easy Dinners (under 30 mins)">Quick & Easy Dinners</option>
                          <option value="Hearty Comfort Food Classics">Comfort Food Classics</option>
                          <option value="Healthy & Light Options">Healthy & Light Options</option>
                          <option value="Kid-Friendly Favorites">Kid-Friendly Favorites</option>
                          <option value="Keto Diet Plan">Keto Diet Plan</option>
                          <option value="Mediterranean Diet Plan">Mediterranean Diet Plan</option>
                          <option value="Budget-Friendly Meals">Budget-Friendly Meals</option>
                          <option value="Vegetarian Delights">Vegetarian Delights</option>
                          <option value="Around the World">Around the World</option>
                          <option value="Italian Night">Italian Night</option>
                          <option value="Mexican Fiesta">Mexican Fiesta</option>
                          <option value="One-Pot Wonders">One-Pot Wonders</option>
                          <option value="Grill Master's Week">Grill Master's Week</option>
                          <option value="Seafood Showcase">Seafood Showcase</option>
                          <option value="Heart Healthy Choices">Heart Healthy Choices</option>
                        </select>
                    </div>
                    <!-- ADDED: AI Context Options -->
                    <div class="col-md-5 mt-2">
                       <label>AI Directives:</label>
                        <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="use-pantry">
                          <label class="form-check-label" for="use-pantry">
                            <i class="fas fa-box-open"></i> Prioritize using my pantry items
                          </label>
                        </div>
                        <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="focus-favorites">
                          <label class="form-check-label" for="focus-favorites">
                            <i class="fas fa-star"></i> Focus on my highest-rated recipes (4+ stars)
                          </label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <button id="build-plan-btn" class="btn btn-primary btn-block">Build My Plan</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- The AI-generated calendar will appear here -->
        <div id="ai-plan-results" style="display: none;"></div>
    </div>
</div>


<script>
// The JavaScript is restored to the version that works with this compact layout.
document.addEventListener('DOMContentLoaded', function() {
    // --- Setup for the permanent Recipe Finder ---
    const searchInput = document.getElementById('recipe-search');
    const suggestBtn = document.getElementById('suggest-btn');
    const recipeTray = document.getElementById('recipe-tray');
    let searchTimeout;

    function updateRecipeTray(recipes) {
        recipeTray.innerHTML = '';
        recipes.forEach(recipe => {
            const card = document.createElement('div');
            card.className = 'recipe-card recipe-tray-card';
            card.dataset.recipeId = recipe.id;
            card.textContent = recipe.name;
            recipeTray.appendChild(card);
        });
    }

    suggestBtn.addEventListener('click', () => fetch('/api/suggest-recipes').then(res => res.json()).then(data => updateRecipeTray(data)));
    searchInput.addEventListener('keyup', () => {
        clearTimeout(searchTimeout);
        const query = searchInput.value;
        if (query.length < 2) return;
        searchTimeout = setTimeout(() => {
            fetch(`/api/search-recipes?query=${encodeURIComponent(query)}`).then(res => res.json()).then(data => updateRecipeTray(data));
        }, 300);
    });
    
    new Sortable(recipeTray, { group: { name: 'recipes', pull: 'clone', put: false }, sort: false });
    suggestBtn.click(); // Load initial suggestions

    // --- Main button to trigger the AI ---
    const buildBtn = document.getElementById('build-plan-btn');
    const themeSelect = document.getElementById('plan-theme');
    const resultsDiv = document.getElementById('ai-plan-results');

    function displayPlan(plan) {
        resultsDiv.innerHTML = ''; 
        
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = "{{ url_for('meal_plan') }}";

        const header = document.createElement('div');
        header.className = 'd-flex justify-content-between align-items-center mb-3';
        header.innerHTML = `<h2>Your AI-Generated Plan</h2><button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Save This Plan</button>`;
        form.appendChild(header);

        const weekdaysRow = document.createElement('div');
        weekdaysRow.className = 'row';
        const weekendRow = document.createElement('div');
        weekendRow.className = 'row mt-3';

        const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        if (!plan || plan.length < 7) {
            resultsDiv.innerHTML = `<div class="alert alert-danger">The AI didn't return a full 7-day plan. Please try again.</div>`;
            return;
        }

        const startOfWeek = new Date("{{ start_of_week.isoformat() }}T00:00:00");

        daysOfWeek.forEach((day, index) => {
            const recipe = plan[index];
            const currentDate = new Date(startOfWeek);
            currentDate.setDate(startOfWeek.getDate() + index);
            const dayStr = currentDate.toISOString().split('T')[0];

            const dayCol = document.createElement('div');
            dayCol.innerHTML = `
                <div class="card ai-day-card h-100">
                    <div class="card-header">${day}</div>
                    <div class="card-body day-slot sortable-list" id="day-${dayStr}">
                        <div class="recipe-card" data-recipe-id="${recipe.id}">${recipe.name}</div>
                    </div>
                    <input type="hidden" name="day-${dayStr}[]" id="input-${dayStr}" value="${recipe.id}">
                </div>
            `;
            
            if (index < 5) {
                dayCol.className = 'col';
                weekdaysRow.appendChild(dayCol);
            } else {
                dayCol.className = 'col-md-6';
                weekendRow.appendChild(dayCol);
            }
        });

        form.appendChild(weekdaysRow);
        form.appendChild(weekendRow);
        resultsDiv.appendChild(form);

        // Activate drop zones for the newly created calendar
        document.querySelectorAll('.day-slot').forEach(function(slot) {
            new Sortable(slot, {
                group: 'recipes',
                onAdd: function(evt) {
                    const item = evt.item;
                    const recipeId = item.dataset.recipeId;
                    const dayId = evt.to.id;
                    const hiddenInput = document.getElementById('input-' + dayId.replace('day-', ''));
                    
                    // Clear the slot and add the new item
                    while (evt.to.children.length > 0) {
                        evt.to.removeChild(evt.to.lastChild);
                    }
                    evt.to.appendChild(item);

                    // Update the value of the single hidden input for this day
                    if (hiddenInput) {
                        hiddenInput.value = recipeId;
                    }
                }
            });
        });
    }

    buildBtn.addEventListener('click', function() {
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = '<div class="text-center card p-3"><p class="lead">🧠 Contacting the AI Architect... Please wait...</p></div>';
        buildBtn.disabled = true;

        const usePantry = document.getElementById('use-pantry').checked;
        const focusFavorites = document.getElementById('focus-favorites').checked;

        fetch('/api/build-plan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ theme: themeSelect.value, use_pantry: usePantry, focus_favorites: focusFavorites })
        })
        .then(response => response.json())
        .then(result => {
            if(result.error) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">Error: ${result.error}</div>`;
            } else {
                displayPlan(result);
            }
        })
        .catch(error => {
            resultsDiv.innerHTML = `<div class="alert alert-danger">A network error occurred. Please try again.</div>`;
            console.error('Error:', error);
        })
        .finally(() => {
            buildBtn.disabled = false;
        });
    });
});
</script>
{% endblock %}
