{% extends 'base.html' %}
{% block content %}
<!-- THIS STYLE BLOCK IS THE FIX FOR MOBILE VIEW -->
<style>
    @media (max-width: 767.98px) {
        .day-column-mobile-architect {
            width: 100%;
            margin-bottom: 1rem;
        }
        .recipe-tray-mobile, .custom-items-mobile {
            display: block !important;
        }
        .ai-architect-main-content {
            padding-top: 1rem;
        }
        #ai-plan-results-container .monthly-calendar-grid {
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            font-size: 0.8rem;
        }
         #ai-plan-results-container .calendar-day {
            min-height: 80px;
            padding: 2px;
         }
         #ai-plan-results-container .recipe-card {
            font-size: 0.7rem;
            padding: 3px 15px 3px 5px;
         }
    }
</style>

<div class="row">
    <!-- Desktop-Only Recipe Tray Column -->
    <div class="col-md-2 no-print d-none d-md-block">
        <div class="sticky-top" style="top: 1rem;">
            <div class="card mb-3">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-utensils"></i> Recipe Tray</h5>
                </div>
                <div class="card-body">
                    <input type="search" id="recipe-search" class="form-control mb-3" placeholder="Search...">
                    <div class="nav nav-tabs" id="recipeTypeTab" role="tablist">
                        <a class="nav-item nav-link active col-6 text-center" data-toggle="tab" href="#main-tray">Mains</a>
                        <a class="nav-item nav-link col-6 text-center" data-toggle="tab" href="#side-tray">Sides</a>
                        <a class="nav-item nav-link col-6 text-center" data-toggle="tab" href="#snack-tray">Snacks</a>
                        <a class="nav-item nav-link col-6 text-center" data-toggle="tab" href="#prep-tray">Meal Prep</a>
                    </div>
                    <div class="tab-content pt-3" id="recipe-tray-container">
                        <div class="tab-pane fade show active" id="main-tray" role="tabpanel"><div class="sortable-list recipe-tray" style="min-height: 50px;"></div></div>
                        <div class="tab-pane fade" id="side-tray" role="tabpanel"><div class="sortable-list recipe-tray" style="min-height: 50px;"></div></div>
                        <div class="tab-pane fade" id="snack-tray" role="tabpanel"><div class="sortable-list recipe-tray" style="min-height: 50px;"></div></div>
                        <div class="tab-pane fade" id="prep-tray" role="tabpanel"><div class="sortable-list recipe-tray" style="min-height: 50px;"></div></div>
                    </div>
                </div>
            </div>
             <div class="card mb-2 no-print">
                <div class="card-header"><h5 class="mb-0"><i class="fas fa-plus-circle"></i> Custom Items</h5></div>
                <div class="card-body">
                    <div class="input-group">
                        <input type="text" id="custom-item-input" class="form-control" placeholder="e.g., Leftovers">
                        <div class="input-group-append"><button class="btn btn-outline-secondary" type="button" id="add-custom-item-btn">+</button></div>
                    </div>
                    <div id="custom-item-tray" class="sortable-list recipe-tray mt-2" style="min-height: 38px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main AI Architect Card -->
    <div class="col-md-10 ai-architect-main-content">
        <div class="card mb-3">
            <div class="card-body">
                <div class="text-center">
                    <h1><i class="fas fa-magic"></i> AI Meal Plan Architect</h1>
                    <p class="lead mb-0">Choose your directives and let the AI build a plan for you!</p>
                </div>
                <hr>
                <div class="row align-items-end">
                    <div class="col-md-9">
                        <div class="row">
                            <div class="col-lg-3 form-group">
                                <label for="plan-duration"><strong>Plan Duration:</strong></label>
                                <select id="plan-duration" class="form-control">
                                    <option value="week">This Week</option>
                                    <option value="month">A Full Month</option>
                                </select>
                            </div>
                             <div class="col-lg-3 form-group" id="month-year-selector" style="display: none;">
                                <label for="plan-month"><strong>For Month/Year:</strong></label>
                                <div class="d-flex">
                                    <select id="plan-month" class="form-control mr-2">
                                        {% for i in range(1, 13) %}
                                        <option value="{{ i }}" {% if i == today.month %}selected{% endif %}>{{ calendar.month_name[i] }}</option>
                                        {% endfor %}
                                    </select>
                                    <select id="plan-year" class="form-control">
                                        <option value="{{ today.year }}">{{ today.year }}</option>
                                        <option value="{{ today.year + 1 }}">{{ today.year + 1 }}</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-lg-3 form-group">
                                <label for="plan-theme"><strong>Choose a Theme:</strong></label>
                                <select id="plan-theme" class="form-control">
                                    <option value="A Balanced and Varied Plan">A Balanced Plan</option>
                                    <option value="Quick & Easy Dinners (under 30 mins)">Quick & Easy</option>
                                    <option value="Hearty Comfort Food Classics">Comfort Food Classics</option>
                                    <option value="Healthy & Light Options">Healthy & Light</option>
                                    <option value="Global Cuisine Tour">Global Cuisine Tour</option>
                                    <option value="Vegetarian Delight">Vegetarian Delight</option>
                                    <option value="Kid-Friendly Favorites">Kid-Friendly</option>
                                    <option value="High-Protein Power Week">High-Protein</option>
                                    <option value="Budget-Friendly Meals">Budget-Friendly</option>
                                    <option value="Meal Prep for the Week">Meal Prep</option>
                                    <option value="Seasonal Ingredients Focus">Seasonal Focus</option>
                                    <option value="Leftovers & Creative Uses">Leftovers & Creative Uses</option>
                                </select>
                            </div>
                            <div class="col-lg-3 form-group">
                                <label><strong>Other Directives:</strong></label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="use-pantry">
                                    <label class="form-check-label" for="use-pantry"><i class="fas fa-box-open"></i> Use pantry items</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="focus-favorites">
                                    <label class="form-check-label" for="focus-favorites"><i class="fas fa-star"></i> Use favorites</label>
                                </div>
                            </div>
                        </div>
                         <div class="form-group mb-0">
                            <label for="takeout-days"><i class="fas fa-utensils"></i> Takeout / Restaurant Dinners: <strong id="takeout-days-label">0</strong></label>
                            <input type="range" class="custom-range" id="takeout-days" min="0" max="7" value="0">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <button id="build-plan-btn" class="btn btn-primary btn-block btn-lg mt-3 mt-md-0">Build My Plan</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="ai-plan-results-container"></div>
    </div>
</div>

<!-- MODAL FOR MOBILE RECIPE SELECTION -->
<div class="modal fade" id="addRecipeModalArchitect" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-scrollable" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitleArchitect">Add to Plan</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <input type="search" id="modal-recipe-search-architect" class="form-control mb-3" placeholder="Search recipes...">
        <div id="modal-recipe-list-architect">
          <!-- Recipe list will be populated by JavaScript -->
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const allRecipesForJs = {{ recipes_for_js | tojson }};
    const buildBtn = document.getElementById('build-plan-btn');
    const resultsContainer = document.getElementById('ai-plan-results-container');
    const takeoutSlider = document.getElementById('takeout-days');
    const takeoutLabel = document.getElementById('takeout-days-label');
    const durationSelector = document.getElementById('plan-duration');
    const monthYearSelector = document.getElementById('month-year-selector');
    
    let originalGeneratedPlan = null;
    let currentMobileSlot = null; // Variable to hold the mobile slot being edited

    function isMobile() {
        return window.innerWidth < 768;
    }

    function createCard(item, includeRemoveButton = true) {
        const card = document.createElement('div');
        let itemTypeClass = 'custom';
        let mealType = 'Custom';
        if (item.id) { 
            const recipeDetails = allRecipesForJs['Main Course'].find(r => r.id === item.id) || allRecipesForJs['Side Dish'].find(r => r.id === item.id) || allRecipesForJs['Snack'].find(r => r.id === item.id) || allRecipesForJs['Meal Prep'].find(r => r.id === item.id);
            mealType = recipeDetails?.meal_type || 'Main Course';
            itemTypeClass = mealType.toLowerCase().replace(' ', '-');
        }
        card.className = `recipe-card meal-type-${itemTypeClass}`;
        if (item.id) {
            card.dataset.recipeId = item.id;
            card.dataset.mealType = mealType;
        } else {
            card.dataset.itemName = item.name;
        }
        card.textContent = item.name;

        if (includeRemoveButton) {
            const removeBtn = document.createElement('span');
            removeBtn.className = 'remove-recipe-btn no-print';
            removeBtn.innerHTML = '×';
            card.appendChild(removeBtn);
        }
        return card;
    }
    
    function renderRecipeTray(recipes) {
        for (const mealType in recipes) {
            let simpleId = mealType === 'Meal Prep' ? 'prep-tray' : mealType.split(' ')[0].toLowerCase() + '-tray';
            const targetTray = document.querySelector(`#${simpleId} .recipe-tray`);
            if (targetTray) {
                targetTray.innerHTML = '';
                recipes[mealType].forEach(recipe => {
                    const card = createCard({id: recipe.id, name: recipe.name, meal_type: recipe.meal_type}, false);
                    card.classList.add('recipe-tray-item');
                    targetTray.appendChild(card);
                });
            }
        }
    }

    function initializeSortable(container) {
        if (isMobile()) return; // Do not initialize drag-drop on mobile
        container.querySelectorAll('.sortable-list').forEach(list => {
            new Sortable(list, {
                group: { name: 'shared-group', pull: true, put: true },
                animation: 150,
                sort: true,
                onAdd: function (evt) {
                    if (!evt.item.querySelector('.remove-recipe-btn')) {
                        const removeBtn = document.createElement('span');
                        removeBtn.className = 'remove-recipe-btn no-print';
                        removeBtn.innerHTML = '×';
                        evt.item.appendChild(removeBtn);
                    }
                }
            });
        });
    }

    function displayPlan(response) {
        originalGeneratedPlan = response;
        const plan = response.plan;
        const duration = response.duration;
        let planHtml = `<div class="card"><div class="card-body"><div class="d-flex justify-content-between align-items-center mb-3 flex-wrap"><h2>Your AI-Generated Plan</h2><button id="save-ai-plan-btn" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Save This Plan</button></div>`;

        let planContainerId = `ai-${duration}-plan`;
        planHtml += `<div id="${planContainerId}">`;

        if (duration === 'week') {
            planHtml += `<div class="d-flex flex-wrap">`;
            const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            daysOfWeek.forEach((day) => {
                planHtml += `<div class="day-column day-column-mobile-architect"><div class="card day-card h-100"><div class="card-header text-center">${day}</div><div class="card-body day-card-body">`;
                ['Breakfast', 'Lunch', 'Dinner'].forEach(slot => {
                    planHtml += `<h6 class="meal-type-header">${slot}</h6><div class="meal-type-slot sortable-list" data-day="${day}" data-slot="${slot}"></div>`;
                });
                planHtml += `</div></div></div>`;
            });
            planHtml += `</div>`;
        } else if (duration === 'month') {
            const year = response.year;
            const month = response.month;
            const firstDay = new Date(year, month - 1, 1);
            const startingDayOfWeek = (firstDay.getDay() + 6) % 7;
            const daysInMonth = new Date(year, month, 0).getDate();
            
            planHtml += `<div class="monthly-calendar-grid">`;
            ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].forEach(day => planHtml += `<div class="calendar-header">${day}</div>`);
            
            for(let i = 0; i < startingDayOfWeek; i++) { planHtml += `<div class="calendar-day not-current-month"></div>`; }
            
            for(let day = 1; day <= daysInMonth; day++) {
                planHtml += `<div class="calendar-day"><div class="day-number">${day}</div><div class="meals sortable-list" data-day="${day}"></div></div>`;
            }
            planHtml += `</div>`;
        }
        
        planHtml += `</div></div></div>`;
        resultsContainer.innerHTML = planHtml;
        
        const planContainer = document.getElementById(planContainerId);
        for (const day in plan) {
            if (duration === 'week') {
                for (const slot in plan[day]) {
                    const slotEl = planContainer.querySelector(`[data-day="${day}"][data-slot="${slot}"]`);
                    if (slotEl) {
                        slotEl.appendChild(createCard(plan[day][slot]));
                    }
                }
            } else { // month
                 const dayEl = planContainer.querySelector(`[data-day="${day}"]`);
                 if(dayEl) {
                    ['Breakfast', 'Lunch', 'Dinner'].forEach(slot => {
                        if(plan[day][slot] && plan[day][slot].name !== 'Unplanned') {
                            dayEl.appendChild(createCard(plan[day][slot]));
                        }
                    });
                 }
            }
        }

        initializeSortable(planContainer);
    }
    
    function getCurrentPlanFromDOM() {
        const finalPlan = {};
        if (!originalGeneratedPlan) return null;

        if (originalGeneratedPlan.duration === 'week') {
            document.querySelectorAll('#ai-week-plan .sortable-list').forEach(slot => {
                const day = slot.dataset.day;
                const mealSlot = slot.dataset.slot;
                const card = slot.querySelector('.recipe-card');
                if (!finalPlan[day]) finalPlan[day] = {};
                if (card) {
                    finalPlan[day][mealSlot] = {
                        id: card.dataset.recipeId ? parseInt(card.dataset.recipeId) : null,
                        name: card.textContent.replace('×', '').trim()
                    };
                } else {
                    finalPlan[day][mealSlot] = { id: null, name: 'Unplanned' };
                }
            });
        } else { // month
            for(let i=1; i <= Object.keys(originalGeneratedPlan.plan).length; i++) {
                const day = i.toString();
                const dayContainer = document.querySelector(`#ai-month-plan [data-day="${day}"]`);
                finalPlan[day] = { Breakfast: {id:null, name:'Unplanned'}, Lunch: {id:null, name:'Unplanned'}, Dinner: {id:null, name:'Unplanned'}};
                if (dayContainer) {
                    const cards = dayContainer.querySelectorAll('.recipe-card');
                    if (cards[0]) finalPlan[day].Breakfast = { id: cards[0].dataset.recipeId ? parseInt(cards[0].dataset.recipeId) : null, name: cards[0].textContent.replace('×', '').trim() };
                    if (cards[1]) finalPlan[day].Lunch = { id: cards[1].dataset.recipeId ? parseInt(cards[1].dataset.recipeId) : null, name: cards[1].textContent.replace('×', '').trim() };
                    if (cards[2]) finalPlan[day].Dinner = { id: cards[2].dataset.recipeId ? parseInt(cards[2].dataset.recipeId) : null, name: cards[2].textContent.replace('×', '').trim() };
                }
            }
        }
        return { ...originalGeneratedPlan, plan: finalPlan };
    }


    // --- Event Listeners ---
    durationSelector.addEventListener('change', function() {
        monthYearSelector.style.display = (this.value === 'month') ? 'block' : 'none';
        takeoutSlider.max = (this.value === 'month') ? 10 : 7;
        if (takeoutSlider.value > takeoutSlider.max) {
            takeoutSlider.value = takeoutSlider.max;
            takeoutLabel.textContent = takeoutSlider.max;
        }
    });

    takeoutSlider.addEventListener('input', function() { takeoutLabel.textContent = this.value; });

    buildBtn.addEventListener('click', function() {
        resultsContainer.innerHTML = '<div class="text-center card p-3"><p class="lead">🧠 Contacting AI Architect... This may take a moment...</p><div class="spinner-border text-primary" role="status"><span class="sr-only">Loading...</span></div></div>';
        buildBtn.disabled = true;
        const payload = {
            duration: durationSelector.value,
            theme: document.getElementById('plan-theme').value,
            use_pantry: document.getElementById('use-pantry').checked,
            focus_favorites: document.getElementById('focus-favorites').checked,
            takeout_days: takeoutSlider.value,
            month: document.getElementById('plan-month').value,
            year: document.getElementById('plan-year').value
        };
        fetch('/api/build-plan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(displayPlan)
        .catch(error => {
            resultsContainer.innerHTML = `<div class="alert alert-danger">An error occurred. Please try again.</div>`;
            console.error('Error:', error);
        })
        .finally(() => { buildBtn.disabled = false; });
    });
    
    // Main click handler for the results container
    resultsContainer.addEventListener('click', function(e) {
        if (e.target.id === 'save-ai-plan-btn') {
            const saveBtn = e.target;
            const finalPlanData = getCurrentPlanFromDOM();
            if (!finalPlanData) return;
            let confirmMessage = `This will save the generated plan.`;
            if (finalPlanData.duration === 'month') {
                const monthName = new Date(finalPlanData.year, finalPlanData.month - 1).toLocaleString('default', { month: 'long' });
                confirmMessage += `\n\nWARNING: This will REPLACE all existing meals for ${monthName} ${finalPlanData.year}.`;
            }
            if (confirm(confirmMessage)) {
                saveBtn.disabled = true;
                saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                fetch('/api/save-ai-plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalPlanData)
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) { window.location.href = data.redirect_url; } 
                    else {
                        alert('Error saving plan: ' + data.error);
                        saveBtn.disabled = false;
                        saveBtn.innerHTML = '<i class="fas fa-save"></i> Save This Plan';
                    }
                });
            }
        }
        if (e.target.classList.contains('remove-recipe-btn')) {
            e.target.closest('.recipe-card').remove();
        }
        // MOBILE-ONLY: Open modal on slot click
        if (isMobile() && e.target.classList.contains('meal-type-slot')) {
            currentMobileSlot = e.target;
            document.getElementById('modalTitleArchitect').textContent = `Editing ${currentMobileSlot.dataset.day} - ${currentMobileSlot.dataset.slot}`;
            populateModalRecipeListArchitect();
            $('#addRecipeModalArchitect').modal('show');
        }
    });

    // --- Mobile Modal Logic ---
    function populateModalRecipeListArchitect(filter = '') {
        const listContainer = document.getElementById('modal-recipe-list-architect');
        listContainer.innerHTML = '';
        const lowerFilter = filter.toLowerCase();

        for (const mealType in allRecipesForJs) {
            const filteredRecipes = allRecipesForJs[mealType].filter(r => r.name.toLowerCase().includes(lowerFilter));
            if (filteredRecipes.length > 0) {
                const header = document.createElement('h6');
                header.textContent = mealType;
                listContainer.appendChild(header);
                filteredRecipes.forEach(recipe => {
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-outline-primary btn-block text-left mb-2';
                    btn.textContent = recipe.name;
                    btn.onclick = () => {
                        currentMobileSlot.innerHTML = ''; // Clear previous
                        currentMobileSlot.appendChild(createCard(recipe));
                        $('#addRecipeModalArchitect').modal('hide');
                    };
                    listContainer.appendChild(btn);
                });
            }
        }
    }

    document.getElementById('modal-recipe-search-architect').addEventListener('input', function() {
        populateModalRecipeListArchitect(this.value);
    });


    // --- Non-plan related listeners ---
    document.getElementById('add-custom-item-btn').addEventListener('click', () => {
        const input = document.getElementById('custom-item-input');
        const tray = document.getElementById('custom-item-tray');
        const itemName = input.value.trim();
        if (itemName) {
            tray.appendChild(createCard({ name: itemName }, false));
            input.value = '';
        }
    });
    
    // --- Initial setup ---
    initializeSortable(document);
    renderRecipeTray(allRecipesForJs);
});
</script>
{% endblock %}
